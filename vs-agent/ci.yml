name: CI (vs-agent)
on: [push, pull_request]
jobs:
  test-vs-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ruff pytest
      - name: Lint
        working-directory: vs-agent
        run: ruff check .
      - name: Test
        working-directory: vs-agent
        run: pytest -v
